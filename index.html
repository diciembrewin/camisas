<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diseños Deportivos</title>

<style>

/* GENERAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

/* HEADER */
header {
    background: #020617;
    padding: 15px 20px;
    font-size: 22px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px 20px;
    background: #1e293b;
}

.hero h1 {
    font-size: 36px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* TARJETAS */
.card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGEN */
.card img {
    width: 100%;
    border-radius: 10px;
}

/* TEXTO */
.card h3 {
    margin: 10px 0;
}

/* FOOTER */
footer {
    background: #020617;
    padding: 20px;
    text-align: center;
    color: #94a3b8;
}

</style>
</head>

<body>

<header>
🏃 Diseños Deportivos
</header>

<section class="hero">
<h1>Colección de Estilos</h1>
<p>Diseños modernos inspirados en ropa deportiva</p>
</section>

<section class="grid">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Diseño Azul</h3>
<p>Estilo clásico</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Diseño Blanco</h3>
<p>Minimalista</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Diseño Oscuro</h3>
<p>Moderno</p>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Diseño Tricolor</h3>
<p>Inspiración deportiva</p>
</div>

</section>

<footer>
Página informativa sobre estilos deportivos
</footer>

</body>
</html>
